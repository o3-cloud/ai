  #info a {

    text-decoration: none;
  }

  .controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 8px;
  }
  .controls button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;

  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

// Node lookup
const nodeMap = new Map();
GRAPH_DATA.nodes.forEach(n => {
  n.x = W/2 + (Math.random() - 0.5) * 400;
  n.y = H/2 + (Math.random() - 0.5) * 400;
  n.vx = 0;
  n.vy = 0;
  n.r = n.value || 8;
  nodeMap.set(n.id, n);
});

// Track connections for force layout
const edges = GRAPH_DATA.edges;

// --- Physics ---
let physicsOn = true;

function tick() {
  if (!physicsOn) { draw(); requestAnimationFrame(tick); return; }

  // Repulsion between all nodes
  for (let i = 0; i < GRAPH_DATA.nodes.length; i++) {
    const a = GRAPH_DATA.nodes[i];
    for (let j = i + 1; j < GRAPH_DATA.nodes.length; j++) {
      const b = GRAPH_DATA.nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist2 = dx*dx + dy*dy || 1;
      const dist = Math.sqrt(dist2);
      const force = (a.r * b.r) / dist2 * 30;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Spring attraction along edges
  edges.forEach(e => {
    const a = nodeMap.get(e.from);
    const b = nodeMap.get(e.to);
    if (!a || !b) return;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const targetDist = 60 + (a.r + b.r) * 3;
    const force = (dist - targetDist) * 0.01;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // Center gravity
  GRAPH_DATA.nodes.forEach(n => {
    n.vx += (W/2 - n.x) * 0.0005;
    n.vy += (H/2 - n.y) * 0.0005;
  });

  // Damping & integrate
  GRAPH_DATA.nodes.forEach(n => {
    n.vx *= 0.82;
    n.vy *= 0.82;
    if (!n.fixed) {
      n.x += n.vx;
      n.y += n.vy;
    }
    // Keep in bounds
    n.x = Math.max(n.r, Math.min(W - n.r, n.x));
    n.y = Math.max(n.r, Math.min(H - n.r, n.y));
  });

  draw();
  requestAnimationFrame(tick);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Edges
  ctx.lineWidth = 0.5;
  edges.forEach(e => {
    const a = nodeMap.get(e.from);
    const b = nodeMap.get(e.to);
    if (!a || !b) return;
    const ga = COLORS[a.group] || '#666';
    const gb = COLORS[b.group] || '#666';
    const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, ga + '60');
    grad.addColorStop(1, gb + '60');
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  });

  // Nodes
  GRAPH_DATA.nodes.forEach(n => {
    const color = COLORS[n.group] || '#666';

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = n === hoveredNode ? 20 : 8;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = color + 'dd';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = n === selectedNode ? '#fff' : color;
    ctx.lineWidth = n === selectedNode ? 2 : 1;
    ctx.stroke();

    // Label (only for larger nodes or hovered)
    if (n.r >= 12 || n === hoveredNode || n === selectedNode) {
      ctx.font = `${Math.min(n.r, 11)}px -apple-system, sans-serif`;
      ctx.fillStyle = '#c9d1d9';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = n.label.length > 30 ? n.label.slice(0, 28) + '…' : n.label;
      ctx.fillText(label, n.x, n.y + n.r + 10);
    }
  });
}

// --- Interaction ---
let hoveredNode = null;
let selectedNode = null;
let dragging = null;
let panning = false;
let panX = 0, panY = 0;
let mouseX = 0, mouseY = 0;

function getNodeAt(x, y) {
  for (let n of GRAPH_DATA.nodes) {
    const dx = x - n.x;
    const dy = y - n.y;
    if (dx*dx + dy*dy < n.r * n.r) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (dragging) {
    dragging.x = x;
    dragging.y = y;
    dragging.vx = 0;
    dragging.vy = 0;
    return;
  }

  hoveredNode = getNodeAt(x, y);
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
});

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const node = getNodeAt(x, y);
  if (node) {
    dragging = node;
    node.fixed = true;
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragging) {
    dragging.fixed = false;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const node = getNodeAt(x, y);
    if (node === dragging) {
      selectedNode = node;
      showInfo(node);
    }
    dragging = null;
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 0.9 : 1.1;
  GRAPH_DATA.nodes.forEach(n => {
    n.x = W/2 + (n.x - W/2) * scale;
    n.y = H/2 + (n.y - H/2) * scale;
    n.r = Math.max(4, Math.min(40, n.r * scale));
  });
});

function showInfo(node) {
  const info = document.getElementById('info');
  const groupColors = {
    catalog: 'Catalog Root',
    event: 'Event',
    concept: 'Concept',
    track: 'Track',
    talk: 'Talk',
    speaker: 'Speaker',
  };
  const connections = edges.filter(e => e.from === node.id || e.to === node.id);
  const connectedNames = connections.map(e => {
    const otherId = e.from === node.id ? e.to : e.from;
    const other = nodeMap.get(otherId);
    return other ? other.label : '';
  }).filter(Boolean);

  info.innerHTML = `
    <div class="info-title">${node.label}</div>
    <div class="info-body">
      <strong>Type:</strong> ${groupColors[node.group] || node.group}<br>
      <strong>Connections:</strong> ${connections.length}<br>
      ${connectedNames.length > 0 ? `<strong>Linked to:</strong><br>${connectedNames.slice(0, 10).map(n => '• ' + n).join('<br>')}${connectedNames.length > 10 ? '<br>…and ' + (connectedNames.length - 10) + ' more' : ''}` : ''}
    </div>
  `;
}

function resetView() {
  GRAPH_DATA.nodes.forEach(n => {
    n.x = W/2 + (Math.random() - 0.5) * 400;
    n.y = H/2 + (Math.random() - 0.5) * 400;
    n.vx = 0;
    n.vy = 0;
    n.r = n.value || 8;
  });
}

function togglePhysics() {
  physicsOn = !physicsOn;
  document.getElementById('physBtn').textContent = physicsOn ? 'Pause Physics' : 'Resume Physics';
}

// Stats
const groupCounts = {};
GRAPH_DATA.nodes.forEach(n => { groupCounts[n.group] = (groupCounts[n.group] || 0) + 1; });
const statsEl = document.getElementById('stats');
statsEl.innerHTML = `
  <div><span class="num">${GRAPH_DATA.nodes.length}</span> nodes</div>
  <div><span class="num">${edges.length}</span> edges</div>
  <div style="margin-top:8px"><span class="num">${groupCounts.talk || 0}</span> talks</div>
  <div><span class="num">${groupCounts.speaker || 0}</span> speakers</div>
  <div><span class="num">${groupCounts.track || 0}</span> tracks</div>
  <div><span class="num">${groupCounts.concept || 0}</span> concepts</div>
`;

// Start
tick();
</script>
</body>
</html>
